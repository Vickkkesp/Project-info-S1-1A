{% extends "base.html" %}

{% block content %}
<div style="text-align: center; padding-top: 50px;">
    <style>
        .card {
            border: 2px solid #660011;
            padding: 40px;
            margin: 50px auto;
            background-color: white;
            max-width: 500px;
            border-radius: 8px;
        }
        .card p {
            font-size: 18px;
            margin-bottom: 30px;
        }
        .card a {
            display: block;
            margin: 15px 0;
            padding: 12px 20px;
            background-color: #660011;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
            font-weight: bold;
        }
        .card a:hover {
            background-color: #8b0016;
            transform: scale(1.05);
        }
        .message {
            color: #d9534f;
            font-weight: bold;
            margin-bottom: 20px;
        }
    </style>

    {% if username %}
        <div class="card">
            <p>Bonjour, {{ username }} !</p>
            <a href="/page03">Se déconnecter</a>
        </div>
    {% else %}
        <div class="card">
            {% if message %}
                <p class="message">{{ message }}</p>
            {% endif %}
            
            <h2 style="font-family: 'Playfair Display', serif; margin: 30px 0 20px 0;">Connexion</h2>
            <form method="POST" style="text-align: left;">
                <input type="email" name="email" placeholder="Email" required style="width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
                <input type="password" name="password" placeholder="Mot de passe" required style="width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
                <button type="submit" style="width: 100%; padding: 12px; margin-top: 15px; background-color: #660011; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.3s;">Se connecter</button>
            </form>
            
            <p style="margin-top: 20px; border-top: 1px solid #ddd; padding-top: 20px;">Vous n'avez pas de compte ?</p>
            <a href="/ajouter_utilisateur" style="display: inline-block; margin-top: 10px;">Créer un compte</a>
        </div>
    {% endif %}
</div>
{% endblock %}
