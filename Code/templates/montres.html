{% extends "base.html" %}

{% block content %}
    <section class="hero-section">
        <h1>Nos Montres d'Exception</h1>
    </section>

    <div class="product-grid">
        {% for p in produits %}
            <div class="product-card">
                <h3>{{ p.nom }}</h3>
                <p>{{ p.prix }} €</p>
            </div>
        {% endfor %}
    </div>
{% endblock %}
