<!DOCTYPE html>
<html>
<head>
 <title> Ajout_produit</title>
</head>
<body>
 <h1>Entrez le produit à ajouter</h1>

 {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

 <form method="POST" action="/ajouter_produit" >
    <label for="Type">Type de Bijoux</label><br>
    <select name ="Type" id = "Type" required>
        <option value = "bague">bague</option>
        <option value = "bracelet">bracelet</option>
        <option value = "collier">collier</option>
    </select><br><br>

    <label for="Genre">Genre</label><br>
    <select name ="Genre" id = "Genre">
        <option value = "Homme">Homme</option>
        <option value = "Femme">Femme</option>
        <option value = "NonPrecise">Non précisé</option>
    </select><br><br>

    <label for="Prix">Prix de vente</label><br>
        <input type = "text" id = "Prix" name = "Prix" required><br><br>

    <label for="Nom_bijoux">Nom du bijoux</label><br>
        <input type="text" id="Nom_Bijoux" name="Nom_Bijoux" required><br><br>    
    
    <button type = "submit">Ajouter</button>
 </form>

 <h2><a href="/Liste_produits">Retour à la liste</a></h2>
</body>
</html>
