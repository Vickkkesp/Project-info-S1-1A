<!DOCTYPE html>
<html lang="fr">
<head>
    <title>Admin</title>
    <style>
        body { font-family: 'Bodoni MT'; }
        .btn-container { text-align: center; margin: 20px 0; }
        .btn-generer { 
            background-color: rgba(226, 201, 13, 0.507); 
            color: rgb(0, 0, 0); 
            padding: 12px 24px; 
            text-decoration: none; 
            border-radius: 4px; 
            font-weight: bold;
            display: inline-block;
        }
        .btn-generer:hover { background-color: rgba(217, 211, 163, 0.382); }
        img { margin: 20px 0; }
    </style>
</head>
<body>
    <center>
        <h1>Tableau de bord administratif</h1>
        
        <div class="btn-container">
            <a href="/generer_graphes" class="btn-generer">Générer de nouveaux graphes</a>
        </div>

        <h2>Graphique utilisateurs</h2>
        <img src="{{ url_for('static', filename='graphs/graph_utilisateurs.png') }}?v={{ range(1000000)|random }}" alt="Graphique utilisateurs" width="400" height="400">

        <h2>Graphique distribution produits</h2>
        <img src="{{ url_for('static', filename='graphs/graph_distribution_produits.png') }}?v={{ range(1000000)|random }}" alt="Graphique distribution produits" width="400" height="400">

        <h2>Graphique Chiffre d'affaires</h2>
        <img src="{{ url_for('static', filename='graphs/graph_chiffre_affaire.png') }}?v={{ range(1000000)|random }}" alt="Graphique chiffre d'affaire" width="400" height="400">   

        <h2>Graphique ventes par mois</h2>
        <img src="{{ url_for('static', filename='graphs/graph_ventes_par_mois.png') }}?v={{ range(1000000)|random }}" alt="Graphique ventes par mois" width="400" height="400">

        <h1>Fin données administratives</h1>
    </center>   
</body>
</html>
